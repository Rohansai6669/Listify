<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo X Link Organizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&family=Doto:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="header">
      <nav>
        <h1>Listify</h1>
        <ul>
          <li><button id="todo">ToDo</button></li>
          <li><button id="note">Notes</button></li>
          <li><button id="links">Links</button></li>
        </ul>
      </nav>
    </header>

    <div class="container">
      <div id="todoele">
        <h1>TodoList</h1>
        <div class="input-section">
          <input type="text" id="taskInput" placeholder="Enter your task" />
          <button id="addTaskBtn">Add Task</button>
        </div>
        <ul id="taskList"></ul>
        <button id="clearAllBtn">Clear All Tasks</button>
      </div>
      <div id="noteele">
         <div class="flexarr">
          <div id="notebooks-section">
            <!-- <div style="display: flex; flex-direction:row; "> -->
            <h2>Notebooks</h2>
            <!-- <button id="create" ><h2>+ Create</h2></button> -->
          <!-- </div> -->
            <div id="create-section" >
                <div class="flexarr">
              <div>
                <form id="coverForm">
                  <h4>Select a Cover</h4>
                  <div class="options">
                   
                    <div class="radio-group">
                      <label>
                        <input type="radio" name="cover" value="cover2.jpg" data-type="image">
                        <img src="cover2.jpg" alt="Cover 1">
                      </label>
                      <label>
                        <input type="radio" name="cover" value="cover3.jpg" data-type="image">
                        <img src="cover3.jpg" alt="Cover 2">
                      </label>
                      <label>
                        <input type="radio" name="cover" value="cover4.jpg" data-type="image">
                        <img src="cover4.jpg" alt="Cover 3">
                      </label>
                      <label>
                        <input type="radio" name="cover" value="#FF5733" data-type="color">
                        <div class="color" style="background-color: #FF5733;"></div>
                      </label>
                      <label>
                        <input type="radio" name="cover" value="#33FF57" data-type="color">
                        <div class="color" style="background-color: #33FF57;"></div>
                      </label>
                      <label>
                        <input type="radio" name="cover" value="#3357FF" data-type="color">
                        <div class="color" style="background-color: #3357FF;"></div>
                      </label>
                    </div>
                  </div>
                </form>
              </div>
              <div>
                <h4>New NoteBook</h4>
                <input
                  type="text"
                  id="new-notebook-name"
                  placeholder="Notebook name"
                  maxlength="20"
                />
                <button id="add-notebook">Add Notebook</button>
               
            </div>
            </div>
            </div>
            <ul id="notebooks-list"></ul>
          </div>

          <div id="notes-section">
            <h2 id="selected-notebook-title"></h2>
            <input
              type="text"
              id="new-note-content"
              placeholder="New note content"
            />
            <button id="add-note">Add Note</button>
            <button id="back-to-notebooks">Back to Notebooks</button>
            <ul id="notes-list"></ul>
           
          </div>

          <div id="note-view-section" style="display: none;">
            <h2>Note Details</h2>
            <div style="display: flex; justify-content:space-between;width:100%;">
            <button id="back-to-notes">Back to Notes</button>
            <button id="update-note">Update Note</button>
          </div>
            <textarea id="note-content" style="height: 650px; margin: top 20px;"></textarea>
            
          </div>
        </div>
      </div>
      <div id="linksele">
        <h1>Links</h1>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
